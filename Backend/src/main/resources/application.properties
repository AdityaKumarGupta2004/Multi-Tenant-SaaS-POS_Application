# Application
spring.application.name=pos-system

# Database
spring.datasource.url=${Local_DB_URL}
spring.datasource.username=${Local_DB_USERNAME}
spring.datasource.password=${Local_DB_PASSWORD}


# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${Local_Email}
spring.mail.password=${Local_Email_AppPassword}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Devtools
spring.devtools.livereload.enabled=true

# Server
server.port=5000

# Razorpay
# razorpay.api.key=your razor pay key
# razorpay.api.secret=your razorpay secret key

# Stripe
# stripe.api.key=your stripe key

# Frontend reset URL
app.frontend.reset-url=http://localhost:5173/auth/reset-password?token=

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE